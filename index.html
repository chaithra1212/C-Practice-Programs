<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1><center>Banking Application</center></h1>
    <nav class=""navbar navbar-expand-lg navbar-dark bd-dark px-3"> 
        <a class="navbar-brand" href="#">My Bank</a>
    <ul class="nav justify-content-center">
        <li cla="nav-item">
            <a class="nav-link active" aria-current="page" href="#" onclick="showAccount()">Account</a>
        </li>
        <li cla="nav-item">
            <a class="nav-link active" aria-current="page" href="#" onclick="showProfile()">Profile</a>
        </li>
        <li cla="nav-item">
            <a class="nav-link active" aria-current="page" href="#" onclick="logout()">Logout</a>
        </li>   
    </ul>
     </nav>
    <div class="container-xl">
        <div id="accountSection">
            <div class="card p-4 shadow">
        <h4>Create Account</h4>
        <input type="text" id="name" class="form-control mt-2" placeholder="Enter your name">
         <input type="text" id="bank" class="form-control mt-2" placeholder="Enter your Account Number"> 
         <input type="number" id="phone" class="form-control mt-2" placeholder="Enter your Number">
         <button class="btn btn-primary" onclick="createAccount()">Submit</button>
<hr>
         <h4>Balance: <span id="balance">0</span></h4>
         <input type="number" id="amount" class="form-control mt-2" placeholder="Enter Amount">
        <button type="button" class="btn btn-primary" onclick="deposit()">Deposit</button>
       <button type="button" class="btn btn-secondary" onclick="withdraw()">withdraw</button>
        <button type="button" class="btn btn-info" onclick="showSummary()">Summary</button>
        <p class="mt-3 text-primary" id="message"></p>
    </div>
    </div>
    <div id="profileSection" style="display:none">
        <div class="card p-4 shadow"></div>
        <h4>Profile Details</h4>
       <p id="profileInfo"></p>
    </div>
   </div>
    </div>
    
    <script src="bank.js"></script>
</body>
</html>
